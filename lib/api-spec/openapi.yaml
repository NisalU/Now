openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AI Crypto Trading System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: market
    description: Market data
  - name: signals
    description: AI trading signals
  - name: trades
    description: Trade management
  - name: performance
    description: Performance metrics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /status:
    get:
      operationId: getStatus
      tags: [health]
      summary: System status
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemStatus"

  /symbols:
    get:
      operationId: getSymbols
      tags: [market]
      summary: List supported trading symbols
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SymbolInfo"

  /candles/{symbol}/{timeframe}:
    get:
      operationId: getCandles
      tags: [market]
      summary: Get historical OHLCV candles
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - name: timeframe
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Candle"

  /signal/{symbol}:
    get:
      operationId: getSignal
      tags: [signals]
      summary: Get latest AI trading signal for a symbol
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Signal"

  /signals/history:
    get:
      operationId: getSignalsHistory
      tags: [signals]
      summary: Get historical AI signals
      parameters:
        - name: symbol
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SignalRecord"

  /analysis/{symbol}:
    get:
      operationId: getAnalysis
      tags: [market]
      summary: Get full multi-timeframe market analysis
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MultiTimeframeAnalysis"

  /trades:
    get:
      operationId: getTrades
      tags: [trades]
      summary: Get active trades
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trade"

  /trades/history:
    get:
      operationId: getTradesHistory
      tags: [trades]
      summary: Get closed trade history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trade"

  /trades/{id}/close:
    post:
      operationId: closeTrade
      tags: [trades]
      summary: Manually close an active trade
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Trade closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trade"
        "404":
          description: Trade not found

  /performance:
    get:
      operationId: getPerformance
      tags: [performance]
      summary: Get trading performance metrics
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Performance"

  /market-regime/{symbol}:
    get:
      operationId: getMarketRegime
      tags: [market]
      summary: Get current market regime classification
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketRegime"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    SystemStatus:
      type: object
      required: [ai_engine, websocket, symbols_active, uptime_seconds]
      properties:
        ai_engine:
          type: object
          required: [enabled, model, calls_total]
          properties:
            enabled:
              type: boolean
            model:
              type: string
            last_call_ms:
              type: ["integer", "null"]
            calls_total:
              type: integer
            error:
              type: ["string", "null"]
        websocket:
          type: object
          required: [connected, reconnects]
          properties:
            connected:
              type: boolean
            endpoint:
              type: ["string", "null"]
            reconnects:
              type: integer
        symbols_active:
          type: integer
        uptime_seconds:
          type: number

    SymbolInfo:
      type: object
      required: [symbol, base, quote]
      properties:
        symbol:
          type: string
        base:
          type: string
        quote:
          type: string
        active:
          type: boolean

    Candle:
      type: object
      required: [time, open, high, low, close, volume]
      properties:
        time:
          type: integer
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: number
        delta:
          type: number

    Signal:
      type: object
      required: [symbol, signal, updated]
      properties:
        symbol:
          type: string
        signal:
          type: string
        entry:
          type: ["number", "null"]
        stop_loss:
          type: ["number", "null"]
        take_profit_1:
          type: ["number", "null"]
        take_profit_2:
          type: ["number", "null"]
        risk_reward:
          type: ["number", "null"]
        confidence:
          type: ["number", "null"]
        reasoning:
          type: ["string", "null"]
        htf_bias:
          type: ["string", "null"]
        setup_type:
          type: ["string", "null"]
        invalidation:
          type: ["string", "null"]
        trigger:
          type: ["string", "null"]
        updated:
          type: integer
        gated:
          type: boolean
        gate_reason:
          type: ["string", "null"]
        ai_latency_ms:
          type: ["integer", "null"]
        current_price:
          type: ["number", "null"]

    SignalRecord:
      type: object
      required: [id, symbol, signal, updated]
      properties:
        id:
          type: string
        symbol:
          type: string
        signal:
          type: string
        entry:
          type: ["number", "null"]
        stop_loss:
          type: ["number", "null"]
        take_profit_1:
          type: ["number", "null"]
        risk_reward:
          type: ["number", "null"]
        confidence:
          type: ["number", "null"]
        setup_type:
          type: ["string", "null"]
        trigger:
          type: ["string", "null"]
        updated:
          type: integer
        result:
          type: ["string", "null"]

    MultiTimeframeAnalysis:
      type: object
      required: [symbol, current_price, updated]
      properties:
        symbol:
          type: string
        current_price:
          type: number
        updated:
          type: integer
        timeframes:
          type: object
        market_regime:
          type: ["string", "null"]
        funding_rate:
          type: ["number", "null"]
        open_interest:
          type: ["number", "null"]
        long_short_ratio:
          type: ["number", "null"]

    Trade:
      type: object
      required: [id, symbol, direction, entry, status, opened_at]
      properties:
        id:
          type: string
        symbol:
          type: string
        direction:
          type: string
        entry:
          type: number
        stop_loss:
          type: number
        take_profit_1:
          type: number
        take_profit_2:
          type: ["number", "null"]
        current_price:
          type: ["number", "null"]
        unrealized_pnl:
          type: ["number", "null"]
        realized_pnl:
          type: ["number", "null"]
        status:
          type: string
        break_even_triggered:
          type: boolean
        partial_tp_triggered:
          type: boolean
        trailing_stop_active:
          type: boolean
        trailing_stop_price:
          type: ["number", "null"]
        setup_type:
          type: ["string", "null"]
        confidence:
          type: ["number", "null"]
        opened_at:
          type: integer
        closed_at:
          type: ["integer", "null"]
        close_reason:
          type: ["string", "null"]
        risk_reward:
          type: ["number", "null"]

    Performance:
      type: object
      required: [total_trades, win_rate, total_pnl]
      properties:
        total_trades:
          type: integer
        winning_trades:
          type: integer
        losing_trades:
          type: integer
        win_rate:
          type: number
        total_pnl:
          type: number
        avg_win:
          type: ["number", "null"]
        avg_loss:
          type: ["number", "null"]
        profit_factor:
          type: ["number", "null"]
        max_drawdown:
          type: ["number", "null"]
        avg_risk_reward:
          type: ["number", "null"]
        best_trade:
          type: ["number", "null"]
        worst_trade:
          type: ["number", "null"]

    MarketRegime:
      type: object
      required: [symbol, regime, tradeable]
      properties:
        symbol:
          type: string
        regime:
          type: string
        tradeable:
          type: boolean
        compression:
          type: number
        volatility_expansion:
          type: number
        reasons:
          type: array
          items:
            type: string
